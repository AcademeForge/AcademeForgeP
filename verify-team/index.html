<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>

<meta charset="UTF-8"/>

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>
AcademeForge Workforce Registry
</title>

<link
  rel="preconnect"
  href="https://fonts.googleapis.com"
/>

<link
  rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin
/>

<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
  rel="stylesheet"
/>

<style>

:root{

  --bg:#050816;
  --bg2:#0b1120;

  --card:rgba(15,23,42,.74);

  --text:#e2e8f0;
  --muted:#94a3b8;
  --heading:#ffffff;

  --line:rgba(255,255,255,.08);

  --orange:#f97316;
  --yellow:#facc15;
  --green:#22c55e;

  --shadow:
    0 14px 50px rgba(0,0,0,.42);

  --shadow2:
    0 24px 90px rgba(0,0,0,.55);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  overflow-x:hidden;
}

body{

  font-family:
    Inter,
    system-ui,
    sans-serif;

  background:
    radial-gradient(
      circle at top left,
      rgba(249,115,22,.12),
      transparent 32rem
    ),
    radial-gradient(
      circle at top right,
      rgba(59,130,246,.08),
      transparent 32rem
    ),
    linear-gradient(
      180deg,
      var(--bg),
      var(--bg2)
    );

  color:var(--text);

  min-height:100vh;
}

body::before{

  content:"";

  position:fixed;
  inset:0;

  pointer-events:none;

  background-image:
    linear-gradient(
      rgba(255,255,255,.02) 1px,
      transparent 1px
    ),
    linear-gradient(
      90deg,
      rgba(255,255,255,.02) 1px,
      transparent 1px
    );

  background-size:54px 54px;
}

a{
  text-decoration:none;
  color:inherit;
}

button{
  border:none;
  outline:none;
  cursor:pointer;
  font:inherit;
}

.cw{
  width:100%;
  padding-inline:clamp(16px,4vw,60px);
}

.glass{

  background:var(--card);

  border:1px solid var(--line);

  backdrop-filter:blur(20px);

  -webkit-backdrop-filter:blur(20px);

  box-shadow:var(--shadow);
}

/* =========================================================
HEADER
========================================================= */

.header{

  position:sticky;
  top:0;

  z-index:200;

  border-bottom:1px solid var(--line);

  background:rgba(5,8,22,.65);

  backdrop-filter:blur(20px);
}

.header-inner{

  min-height:82px;

  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:24px;
}

.brand{
  display:flex;
  align-items:center;
  gap:16px;
}

.logo{

  width:54px;
  height:54px;

  border-radius:20px;

  display:grid;
  place-items:center;

  background:
    linear-gradient(
      135deg,
      var(--orange),
      var(--yellow)
    );

  color:#111827;

  font-size:1.5rem;
  font-weight:1000;
}

.brand-title{

  display:block;

  color:var(--heading);

  font-size:1.5rem;
  font-weight:1000;
}

.brand-sub{

  display:block;

  margin-top:4px;

  color:var(--muted);

  font-size:12px;
  font-weight:800;

  letter-spacing:.14em;
  text-transform:uppercase;
}

/* =========================================================
STATS
========================================================= */

.top-right{

  display:flex;
  align-items:center;
  gap:18px;
  flex-wrap:wrap;
}

.stats-row{

  display:flex;
  align-items:center;
  gap:18px;
  flex-wrap:wrap;
}

.stat-card{

  min-width:170px;

  height:76px;

  padding:0 20px;

  border-radius:22px;

  display:flex;
  align-items:center;
  gap:16px;
}

.stat-icon{

  width:48px;
  height:48px;

  border-radius:16px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:22px;
  font-weight:1000;
}

.stat-icon.blue{
  background:rgba(59,130,246,.12);
  color:#60a5fa;
}

.stat-icon.green{
  background:rgba(34,197,94,.12);
  color:#4ade80;
}

.stat-icon.purple{
  background:rgba(168,85,247,.12);
  color:#c084fc;
}

.stat-info strong{

  display:block;

  color:white;

  font-size:1.7rem;
  font-weight:1000;
}

.stat-info span{

  display:block;

  margin-top:4px;

  color:#b6c2d8;

  font-size:.88rem;
  font-weight:700;
}

/* =========================================================
SEARCH
========================================================= */

.search-box{

  width:320px;

  height:74px;

  padding:0 22px;

  border-radius:22px;

  display:flex;
  align-items:center;
  gap:14px;
}

.search-box input{

  width:100%;

  border:none;
  outline:none;

  background:none;

  color:white;

  font-size:15px;
  font-weight:700;
}

.search-box input::placeholder{
  color:#94a3b8;
}

/* =========================================================
MEMBERS
========================================================= */

.members-section{
  padding:34px 0 100px;
}

.members-grid{

  display:flex;
  flex-direction:column;

  gap:34px;
}

.member-card{

  position:relative;

  width:100%;

  min-height:290px;

  perspective:2200px;
}

.member-inner{

  position:relative;

  width:100%;
  min-height:290px;

  transform-style:preserve-3d;

  transition:
    transform .85s cubic-bezier(.22,.61,.36,1);
}

.member-card.flipped .member-inner{
  transform:rotateY(180deg);
}

.member-face{

  position:absolute;
  inset:0;

  width:100%;
  min-height:290px;

  border-radius:34px;

  padding:34px;

  overflow:hidden;

  backface-visibility:hidden;

  background:
    linear-gradient(
      180deg,
      rgba(7,17,39,.98),
      rgba(3,10,24,.99)
    );

  border:
    1px solid rgba(255,255,255,.08);

  box-shadow:
    0 20px 70px rgba(0,0,0,.42);
}

.member-face::before{

  content:"";

  position:absolute;

  width:220px;
  height:220px;

  border-radius:999px;

  top:-100px;
  right:-100px;

  background:
    radial-gradient(
      circle,
      rgba(59,130,246,.14),
      transparent 70%
    );

  pointer-events:none;
}

.member-back{
  transform:rotateY(180deg);
}

/* =========================================================
FRONT
========================================================= */

.member-front{

  display:grid;

  grid-template-columns:
    420px
    170px
    1fr
    250px
    200px;

  gap:28px;
  align-items:center;
}

/* =========================================================
PROFILE
========================================================= */

.member-top{

  display:flex;
  align-items:center;
  gap:24px;

  min-width:0;
}

.member-avatar{

  width:118px;
  height:118px;

  border-radius:30px;

  overflow:hidden;

  flex-shrink:0;

  background:
    linear-gradient(
      135deg,
      #ec4899,
      #7c3aed
    );

  display:flex;
  align-items:center;
  justify-content:center;

  color:white;

  font-size:3.3rem;
  font-weight:1000;

  box-shadow:
    0 18px 50px rgba(236,72,153,.28);
}

.member-avatar img{

  width:100%;
  height:100%;

  object-fit:cover;
}

.member-main{
  min-width:0;
}

.member-row{

  display:flex;
  align-items:center;
  gap:14px;

  flex-wrap:wrap;
}

.member-name{

  color:white;

  font-size:2.7rem;
  font-weight:1000;

  line-height:1;

  letter-spacing:-.05em;
}

.member-status{

  width:42px;
  height:42px;

  border-radius:999px;

  display:flex;
  align-items:center;
  justify-content:center;

  color:white;

  font-size:18px;
  font-weight:1000;
}

.member-status.active{
  background:linear-gradient(135deg,#22c55e,#16a34a);
}

.member-status.on_leave{
  background:linear-gradient(135deg,#f59e0b,#d97706);
}

.member-status.alumni{
  background:linear-gradient(135deg,#64748b,#475569);
}

.member-status.inactive{
  background:linear-gradient(135deg,#ef4444,#dc2626);
}

.member-role{

  margin-top:14px;

  color:#dbe5f4;

  font-size:1.5rem;
  font-weight:700;

  line-height:1.5;
}

.member-id{

  margin-top:14px;

  color:#ff9b31;

  font-size:1rem;
  font-weight:1000;

  letter-spacing:.18em;
}

/* =========================================================
SEPARATOR
========================================================= */

.separator{

  width:1px;
  height:150px;

  background:
    linear-gradient(
      180deg,
      transparent,
      rgba(255,255,255,.10),
      transparent
    );
}

/* =========================================================
CHIPS
========================================================= */

.chips{

  display:flex;
  flex-direction:column;
  gap:16px;
}

.chip{

  min-height:56px;

  padding:
    0 24px;

  border-radius:999px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:1rem;
  font-weight:1000;

  letter-spacing:.10em;
  text-transform:uppercase;
}

.department-chip{

  background:
    rgba(99,102,241,.12);

  color:#93a4ff;

  border:
    1px solid rgba(99,102,241,.18);
}

.status-chip.active{

  background:
    rgba(34,197,94,.12);

  color:#4ade80;

  border:
    1px solid rgba(34,197,94,.18);
}

.status-chip.on_leave{

  background:
    rgba(234,179,8,.12);

  color:#fde047;

  border:
    1px solid rgba(234,179,8,.18);
}

.status-chip.alumni{

  background:
    rgba(168,85,247,.12);

  color:#d8b4fe;

  border:
    1px solid rgba(168,85,247,.18);
}

.status-chip.inactive{

  background:
    rgba(239,68,68,.12);

  color:#f87171;

  border:
    1px solid rgba(239,68,68,.18);
}

/* =========================================================
BIO
========================================================= */

.member-bio{

  color:#d5dff0;

  font-size:1.18rem;

  line-height:2;

  overflow:visible;
}

/* =========================================================
META
========================================================= */

.member-meta{

  padding:24px;

  border-radius:24px;

  background:
    rgba(255,255,255,.03);

  border:
    1px solid rgba(255,255,255,.06);

  display:flex;
  flex-direction:column;
  gap:22px;
}

.meta-item{

  display:flex;
  align-items:center;
  gap:14px;
}

.meta-dot{

  width:14px;
  height:14px;

  border-radius:999px;
}

.meta-dot.green{
  background:#22c55e;
}

.meta-dot.red{
  background:#ef4444;
}

.meta-item span{

  color:#dbe5f4;

  font-size:1.08rem;
  font-weight:700;

  line-height:1.7;
}

/* =========================================================
BUTTONS
========================================================= */

.member-actions{

  display:flex;
  flex-direction:column;
  gap:18px;
}

.verify-btn{

  height:74px;

  border-radius:22px;

  background:
    linear-gradient(
      135deg,
      #22c55e,
      #16a34a
    );

  color:white;

  font-size:1.15rem;
  font-weight:1000;

  box-shadow:
    0 18px 40px rgba(34,197,94,.24);
}

.flip-btn{

  height:74px;

  border-radius:22px;

  background:
    linear-gradient(
      135deg,
      #ff7a00,
      #ff9830
    );

  color:white;

  font-size:1.15rem;
  font-weight:1000;

  box-shadow:
    0 18px 40px rgba(255,122,0,.25);
}

/* =========================================================
BACK
========================================================= */

.member-back{

  display:flex;
  flex-direction:column;
}

.member-links{

  display:grid;

  grid-template-columns:
    repeat(3,1fr);

  gap:20px;

  margin-top:34px;
}

.member-link{

  min-height:90px;

  padding:24px;

  border-radius:24px;

  background:
    rgba(255,255,255,.04);

  border:
    1px solid rgba(255,255,255,.06);

  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:10px;

  transition:.25s ease;
}

.member-link:hover{

  transform:
    translateY(-4px);

  background:
    rgba(255,122,0,.08);

  border-color:
    rgba(255,122,0,.22);
}

.member-link strong{

  color:white;

  font-size:1.1rem;
  font-weight:900;
}

.member-link span{

  color:#94a3b8;

  font-size:.92rem;
  font-weight:700;
}

.back-info{

  margin-top:auto;

  color:#dbe5f4;

  font-size:1rem;
  font-weight:700;

  line-height:2;
}

/* =========================================================
LOADING
========================================================= */

.loading{

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  gap:18px;

  padding:100px 20px;
}

.loader{

  width:58px;
  height:58px;

  border-radius:999px;

  border:
    4px solid rgba(249,115,22,.12);

  border-top-color:
    var(--orange);

  animation:
    spin .8s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

/* =========================================================
RESPONSIVE
========================================================= */

@media (max-width:1600px){

  .member-front{

    grid-template-columns:
      1fr;

    gap:26px;
  }

  .separator{
    display:none;
  }

  .chips{
    flex-direction:row;
    flex-wrap:wrap;
  }

  .member-actions{
    flex-direction:row;
  }

  .member-actions button{
    flex:1;
  }
}

@media (max-width:980px){

  .header-inner{
    flex-direction:column;
    align-items:flex-start;
  }

  .top-right{
    width:100%;
  }

  .search-box{
    width:100%;
  }
}

@media (max-width:900px){

  .member-face{
    padding:24px;
  }

  .member-top{
    flex-direction:column;
    align-items:flex-start;
  }

  .member-name{
    font-size:2rem;
  }

  .member-role{
    font-size:1.15rem;
  }

  .member-bio{
    font-size:1rem;
  }

  .member-links{
    grid-template-columns:1fr;
  }

  .member-actions{
    flex-direction:column;
  }

  .verify-btn,
  .flip-btn{
    width:100%;
  }
}

</style>

</head>

<body>

<header class="header">

  <div class="cw header-inner">

    <div class="brand">

      <div class="logo">
        AF
      </div>

      <div>

        <span class="brand-title">
          AcademeForge
        </span>

        <span class="brand-sub">
          Workforce Registry
        </span>

      </div>

    </div>

    <div class="top-right">

      <div class="stats-row">

        <div class="stat-card glass">

          <div class="stat-icon blue">
            👥
          </div>

          <div class="stat-info">

            <strong id="totalMembers">
              0
            </strong>

            <span>
              Total Members
            </span>

          </div>

        </div>

        <div class="stat-card glass">

          <div class="stat-icon green">
            👤
          </div>

          <div class="stat-info">

            <strong id="activeMembers">
              0
            </strong>

            <span>
              Active Members
            </span>

          </div>

        </div>

        <div class="stat-card glass">

          <div class="stat-icon purple">
            🎓
          </div>

          <div class="stat-info">

            <strong id="alumniMembers">
              0
            </strong>

            <span>
              Alumni Members
            </span>

          </div>

        </div>

      </div>

      <div class="search-box glass">

        <span style="font-size:22px;">
          🔍
        </span>

        <input
          id="searchInput"
          type="text"
          placeholder="Search members..."
        />

      </div>

    </div>

  </div>

</header>

<section class="members-section">

  <div class="cw">

    <div
      id="loading"
      class="loading"
    >

      <div class="loader"></div>

      <p>
        Loading workforce registry...
      </p>

    </div>

    <div
      id="membersGrid"
      class="members-grid"
    ></div>

  </div>

</section>

<script>

const AF_API =
  "https://afooyyydhlwngzssgqih.supabase.co/functions/v1/get-af-team-members";

const AF_ANON_KEY =
  "YOUR_SUPABASE_ANON_KEY";

const CACHE_KEY =
  "af_registry_cache_v8";

const CACHE_TIME =
  "af_registry_cache_time_v8";

const CACHE_DURATION =
  1000 * 60 * 10;

const membersGrid =
  document.getElementById("membersGrid");

const loading =
  document.getElementById("loading");

const searchInput =
  document.getElementById("searchInput");

let allMembers = [];

/* =========================================================
HELPERS
========================================================= */

function escapeHtml(value){

  return String(value || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function safeUrl(url){

  if(!url){
    return "";
  }

  const value =
    String(url).trim();

  if(
    value.startsWith("http://") ||
    value.startsWith("https://")
  ){
    return value;
  }

  return "";
}

function formatDate(date){

  if(!date){
    return "Present";
  }

  try{

    return new Date(date)
      .toLocaleDateString(
        "en-IN",
        {
          year:"numeric",
          month:"short"
        }
      );

  }catch{
    return "Present";
  }
}

function avatar(member){

  if(
    member.avatar_url &&
    member.avatar_url.startsWith("http")
  ){

    return `
      <img
        src="${escapeHtml(member.avatar_url)}"
        alt="${escapeHtml(member.full_name)}"
      />
    `;
  }

  return escapeHtml(
    member.full_name
      .split(" ")
      .map(v => v[0] || "")
      .join("")
      .slice(0,2)
      .toUpperCase()
  );
}

function normalize(member){

  return {

    full_name:
      member.full_name ||
      member.name ||
      "Unknown Member",

    role_title:
      member.role_title ||
      member.role ||
      "AcademeForge Member",

    member_id:
      member.member_id || "",

    department:
      member.department ||
      "AcademeForge",

    bio:
      member.bio ||
      "Verified ecosystem member.",

    status:
      String(member.status || "active")
        .toLowerCase(),

    avatar_url:
      member.avatar_url || "",

    username:
      member.username || "member",

    location:
      member.location || "India",

    joined_at:
      member.joined_at || null,

    ended_at:
      member.ended_at || null,

    linkedin_url:
      safeUrl(member.linkedin_url),

    github_url:
      safeUrl(member.github_url),

    portfolio_url:
      safeUrl(member.portfolio_url)
  };
}

/* =========================================================
CARD
========================================================= */

function card(member){

  const icon =
    member.status === "inactive"
      ? "✕"
      : "✓";

  return `

    <div class="member-card">

      <div class="member-inner">

        <!-- FRONT -->

        <div class="member-face member-front">

          <div class="member-top">

            <div class="member-avatar">
              ${avatar(member)}
            </div>

            <div class="member-main">

              <div class="member-row">

                <div class="member-name">
                  ${escapeHtml(member.full_name)}
                </div>

                <div class="member-status ${member.status}">
                  ${icon}
                </div>

              </div>

              <div class="member-role">
                ${escapeHtml(member.role_title)}
              </div>

              <div class="member-id">
                ${escapeHtml(member.member_id)}
              </div>

            </div>

          </div>

          <div class="separator"></div>

          <div class="chips">

            <div class="chip department-chip">
              ${escapeHtml(member.department)}
            </div>

            <div class="chip status-chip ${member.status}">
              ${escapeHtml(member.status)}
            </div>

          </div>

          <div class="separator"></div>

          <div class="member-bio">
            ${escapeHtml(member.bio)}
          </div>

          <div class="member-meta">

            <div class="meta-item">

              <div class="meta-dot green"></div>

              <span>
                Joined:
                ${formatDate(member.joined_at)}
              </span>

            </div>

            <div class="meta-item">

              <div class="meta-dot ${
                member.ended_at
                  ? "red"
                  : "green"
              }"></div>

              <span>
                ${
                  member.ended_at
                  ? `Ended: ${formatDate(member.ended_at)}`
                  : `Currently Active`
                }
              </span>

            </div>

          </div>

          <div class="member-actions">

            <button class="verify-btn">
              🛡 Verified Member
            </button>

            <button class="flip-btn">
              Flip Card ↻
            </button>

          </div>

        </div>

        <!-- BACK -->

        <div class="member-face member-back">

          <div class="member-name">
            ${escapeHtml(member.full_name)}
          </div>

          <div class="member-role">
            ${escapeHtml(member.role_title)}
          </div>

          <div class="member-links">

            ${
              member.linkedin_url
              ? `
              <a
                href="${escapeHtml(member.linkedin_url)}"
                target="_blank"
                class="member-link"
              >
                <strong>LinkedIn</strong>
                <span>Open Profile →</span>
              </a>
              `
              : ""
            }

            ${
              member.github_url
              ? `
              <a
                href="${escapeHtml(member.github_url)}"
                target="_blank"
                class="member-link"
              >
                <strong>GitHub</strong>
                <span>Open Repository →</span>
              </a>
              `
              : ""
            }

            ${
              member.portfolio_url
              ? `
              <a
                href="${escapeHtml(member.portfolio_url)}"
                target="_blank"
                class="member-link"
              >
                <strong>Portfolio</strong>
                <span>Open Website →</span>
              </a>
              `
              : ""
            }

          </div>

          <div class="back-info">

            📍 ${escapeHtml(member.location)}

            <br><br>

            Username:
            @${escapeHtml(member.username)}

          </div>

        </div>

      </div>

    </div>
  `;
}

/* =========================================================
RENDER
========================================================= */

function render(data){

  membersGrid.innerHTML =
    data.map(card).join("");

  attachFlipEvents();
}

/* =========================================================
FLIP
========================================================= */

function attachFlipEvents(){

  const cards =
    document.querySelectorAll(".member-card");

  cards.forEach(card => {

    card.addEventListener(
      "click",
      () => {

        card.classList.toggle(
          "flipped"
        );
      }
    );

    const links =
      card.querySelectorAll("a");

    links.forEach(link => {

      link.addEventListener(
        "click",
        e => {

          e.stopPropagation();
        }
      );
    });
  });
}

/* =========================================================
CACHE
========================================================= */

function saveCache(data){

  try{

    localStorage.setItem(
      CACHE_KEY,
      JSON.stringify(data)
    );

    localStorage.setItem(
      CACHE_TIME,
      String(Date.now())
    );

  }catch(error){

    console.error(
      "Cache save failed",
      error
    );
  }
}

function loadCache(){

  try{

    const cache =
      localStorage.getItem(
        CACHE_KEY
      );

    const time =
      Number(
        localStorage.getItem(
          CACHE_TIME
        )
      );

    if(
      !cache ||
      !time
    ){
      return null;
    }

    if(
      Date.now() - time >
      CACHE_DURATION
    ){
      return null;
    }

    return JSON.parse(cache);

  }catch(error){

    console.error(
      "Cache load failed",
      error
    );

    return null;
  }
}

/* =========================================================
SEARCH
========================================================= */

searchInput.addEventListener(
  "input",
  () => {

    const query =
      searchInput.value
        .trim()
        .toLowerCase();

    if(!query){

      render(allMembers);
      return;
    }

    const filtered =
      allMembers.filter(member => {

        return [

          member.full_name,
          member.role_title,
          member.department,
          member.member_id,
          member.bio,
          member.status

        ]
        .join(" ")
        .toLowerCase()
        .includes(query);
      });

    render(filtered);
  }
);

/* =========================================================
FETCH
========================================================= */

async function fetchMembers(){

  const response =
    await fetch(AF_API,{
      headers:{
        apikey:AF_ANON_KEY,
        Authorization:
          `Bearer ${AF_ANON_KEY}`
      }
    });

  if(!response.ok){
    throw new Error(
      `HTTP ${response.status}`
    );
  }

  return await response.json();
}

/* =========================================================
LOAD
========================================================= */

async function loadMembers(){

  try{

    loading.style.display =
      "flex";

    const cached =
      loadCache();

    if(
      cached &&
      Array.isArray(cached.members)
    ){

      allMembers =
        cached.members
          .map(normalize);

      updateStats();

      render(allMembers);

      loading.style.display =
        "none";
    }

    const data =
      await fetchMembers();

    allMembers =
      (data.members || [])
        .map(normalize);

    updateStats();

    render(allMembers);

    saveCache({
      members:allMembers
    });

  }catch(error){

    membersGrid.innerHTML = `

      <div class="glass"
        style="
          padding:40px;
          border-radius:30px;
          text-align:center;
        "
      >

        <h2>
          Failed To Load Members
        </h2>

        <p style="margin-top:12px;">
          ${escapeHtml(error.message)}
        </p>

      </div>
    `;

  }finally{

    loading.style.display =
      "none";
  }
}

function updateStats(){

  document.getElementById(
    "totalMembers"
  ).textContent =
    allMembers.length;

  document.getElementById(
    "activeMembers"
  ).textContent =
    allMembers.filter(
      m => m.status === "active"
    ).length;

  document.getElementById(
    "alumniMembers"
  ).textContent =
    allMembers.filter(
      m => m.status === "alumni"
    ).length;
}

window.addEventListener(
  "DOMContentLoaded",
  loadMembers
);

</script>

</body>
</html>
