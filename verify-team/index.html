<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>
AcademeForge Workforce Registry
</title>

<link
  rel="preconnect"
  href="https://fonts.googleapis.com"
/>

<link
  rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin
/>

<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
  rel="stylesheet"
/>

<style>

:root{

  --bg:#020817;
  --card:#071127;

  --text:#ffffff;
  --muted:#9fb0cc;

  --line:rgba(255,255,255,.07);

  --green:#22c55e;
  --orange:#ff8a26;
  --purple:#8b5cf6;
  --red:#ef4444;

  --shadow:
    0 20px 70px rgba(0,0,0,.42);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  overflow-x:hidden;
}

body{

  font-family:
    Inter,
    system-ui,
    sans-serif;

  background:
    radial-gradient(circle at top left, rgba(59,130,246,.10), transparent 30%),
    radial-gradient(circle at top right, rgba(168,85,247,.10), transparent 30%),
    linear-gradient(180deg,#020617 0%,#040d1d 100%);

  color:var(--text);

  min-height:100vh;
}

body::before{

  content:"";

  position:fixed;
  inset:0;

  pointer-events:none;

  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);

  background-size:52px 52px;
}

button{
  border:none;
  outline:none;
  cursor:pointer;
  font:inherit;
}

a{
  text-decoration:none;
  color:inherit;
}

.container{
  width:100%;
  padding-inline:38px;
}

/* =========================================================
TOP
========================================================= */

.topbar{
  padding-top:24px;
  padding-bottom:34px;
}

.topbar-inner{

  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:24px;
  flex-wrap:wrap;
}

.brand{

  display:flex;
  align-items:center;
  gap:18px;
}

.logo{

  width:58px;
  height:58px;

  border-radius:18px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
    linear-gradient(
      135deg,
      #ff7a00,
      #ffb020
    );

  color:white;

  font-size:28px;
  font-weight:1000;

  box-shadow:
    0 16px 40px rgba(255,122,0,.35);
}

.brand-title{

  font-size:2.1rem;
  font-weight:1000;
}

.brand-sub{

  margin-top:4px;

  color:#b8c4da;

  font-size:1rem;
  font-weight:600;
}

.right-top{

  display:flex;
  align-items:center;
  gap:18px;
  flex-wrap:wrap;
}

.stats{

  display:flex;
  align-items:center;
  gap:18px;
  flex-wrap:wrap;
}

.stat-card{

  min-width:180px;

  height:74px;

  padding:0 20px;

  border-radius:22px;

  display:flex;
  align-items:center;
  gap:16px;

  background:
    linear-gradient(
      180deg,
      rgba(8,18,38,.98),
      rgba(5,10,24,.98)
    );

  border:
    1px solid var(--line);

  box-shadow:var(--shadow);
}

.stat-icon{

  width:48px;
  height:48px;

  border-radius:16px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:22px;
}

.stat-icon.blue{
  background:rgba(59,130,246,.12);
}

.stat-icon.green{
  background:rgba(34,197,94,.12);
}

.stat-icon.purple{
  background:rgba(168,85,247,.12);
}

.stat-info small{

  display:block;

  color:#b8c4da;

  font-size:.88rem;
  font-weight:700;
}

.stat-info strong{

  display:block;

  margin-top:5px;

  font-size:1.9rem;
  font-weight:1000;
}

.search{

  width:320px;
  height:74px;

  padding:0 24px;

  border-radius:22px;

  display:flex;
  align-items:center;
  gap:14px;

  background:
    linear-gradient(
      180deg,
      rgba(8,18,38,.98),
      rgba(5,10,24,.98)
    );

  border:
    1px solid var(--line);

  box-shadow:var(--shadow);
}

.search input{

  width:100%;

  background:none;
  border:none;
  outline:none;

  color:white;

  font-size:1rem;
  font-weight:700;
}

.search input::placeholder{
  color:#8ea0bf;
}

/* =========================================================
MEMBERS
========================================================= */

.members{
  padding-bottom:90px;
}

.members-grid{

  display:flex;
  flex-direction:column;
  gap:34px;
}

.member-card{

  position:relative;

  perspective:2400px;

  width:100%;
}

.member-inner{

  position:relative;

  width:100%;

  min-height:290px;

  transform-style:preserve-3d;

  transition:
    transform .85s cubic-bezier(.22,.61,.36,1);
}

.member-card.flipped .member-inner{
  transform:rotateY(180deg);
}

.member-face{

  position:absolute;
  inset:0;

  width:100%;
  min-height:290px;

  border-radius:34px;

  padding:34px;

  background:
    linear-gradient(
      180deg,
      rgba(7,17,39,.99),
      rgba(2,8,24,.99)
    );

  border:
    1px solid rgba(255,255,255,.07);

  box-shadow:var(--shadow);

  backface-visibility:hidden;

  overflow:hidden;
}

.member-face::before{

  content:"";

  position:absolute;

  width:240px;
  height:240px;

  border-radius:999px;

  top:-100px;
  right:-100px;

  background:
    radial-gradient(
      circle,
      rgba(59,130,246,.14),
      transparent 70%
    );

  pointer-events:none;
}

.member-front{

  display:grid;

  grid-template-columns:
    430px
    210px
    1fr
    260px
    200px;

  gap:28px;
  align-items:center;
}

.member-back{

  transform:rotateY(180deg);

  display:flex;
  flex-direction:column;
}

/* =========================================================
PROFILE
========================================================= */

.profile{

  display:flex;
  align-items:center;
  gap:24px;

  min-width:0;
}

.avatar{

  width:122px;
  height:122px;

  border-radius:32px;

  flex-shrink:0;

  display:flex;
  align-items:center;
  justify-content:center;

  overflow:hidden;

  background:
    linear-gradient(
      135deg,
      #ff006e,
      #7c3aed
    );

  color:white;

  font-size:3.4rem;
  font-weight:1000;

  box-shadow:
    0 22px 50px rgba(236,72,153,.30);
}

.avatar img{

  width:100%;
  height:100%;

  object-fit:cover;
}

.profile-info{
  min-width:0;
}

.name-row{

  display:flex;
  align-items:center;
  gap:14px;
  flex-wrap:wrap;
}

.member-name{

  font-size:2.7rem;
  font-weight:1000;

  letter-spacing:-.06em;

  line-height:1;
}

.verify{

  width:44px;
  height:44px;

  border-radius:999px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:20px;
  font-weight:1000;

  color:white;

  background:
    linear-gradient(
      135deg,
      #22c55e,
      #16a34a
    );
}

.verify.red{

  background:
    linear-gradient(
      135deg,
      #ef4444,
      #dc2626
    );
}

.role{

  margin-top:14px;

  color:#dbe5f4;

  font-size:1.55rem;
  font-weight:700;

  line-height:1.4;
}

.member-id{

  margin-top:14px;

  color:#ff9b31;

  font-size:1rem;
  font-weight:1000;

  letter-spacing:.18em;
}

/* =========================================================
SEPARATOR
========================================================= */

.separator{

  width:1px;
  height:150px;

  background:
    linear-gradient(
      180deg,
      transparent,
      rgba(255,255,255,.10),
      transparent
    );
}

/* =========================================================
BADGES
========================================================= */

.badges{

  display:flex;
  flex-direction:column;
  gap:16px;
}

.badge{

  min-height:58px;

  padding:
    0 24px;

  border-radius:999px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:1rem;
  font-weight:1000;

  letter-spacing:.10em;
  text-transform:uppercase;
}

.badge.department{

  background:
    rgba(99,102,241,.12);

  color:#93a4ff;

  border:
    1px solid rgba(99,102,241,.16);
}

.badge.active{

  background:
    rgba(34,197,94,.12);

  color:#4ade80;

  border:
    1px solid rgba(34,197,94,.18);
}

.badge.alumni{

  background:
    rgba(168,85,247,.12);

  color:#d8b4fe;

  border:
    1px solid rgba(168,85,247,.18);
}

.badge.on_leave{

  background:
    rgba(234,179,8,.12);

  color:#fde047;

  border:
    1px solid rgba(234,179,8,.18);
}

.badge.inactive{

  background:
    rgba(239,68,68,.12);

  color:#f87171;

  border:
    1px solid rgba(239,68,68,.18);
}

/* =========================================================
BIO
========================================================= */

.bio{

  color:#d0daea;

  font-size:1.28rem;

  line-height:2.1;
}

/* =========================================================
META
========================================================= */

.meta{

  padding:24px;

  border-radius:24px;

  background:
    rgba(255,255,255,.03);

  border:
    1px solid rgba(255,255,255,.06);

  display:flex;
  flex-direction:column;
  gap:22px;
}

.meta-item{

  display:flex;
  align-items:center;
  gap:14px;
}

.dot{

  width:14px;
  height:14px;

  border-radius:999px;
}

.dot.green{
  background:#22c55e;
}

.dot.red{
  background:#ef4444;
}

.meta-item span{

  color:#dbe5f4;

  font-size:1.15rem;
  font-weight:700;

  line-height:1.7;
}

/* =========================================================
BUTTONS
========================================================= */

.actions{

  display:flex;
  flex-direction:column;
  gap:18px;
}

.verify-btn{

  height:76px;

  border-radius:22px;

  background:
    linear-gradient(
      135deg,
      #22c55e,
      #16a34a
    );

  color:white;

  font-size:1.2rem;
  font-weight:1000;

  box-shadow:
    0 18px 40px rgba(34,197,94,.25);
}

.flip-btn{

  height:76px;

  border-radius:22px;

  background:
    linear-gradient(
      135deg,
      #ff7a00,
      #ff9830
    );

  color:white;

  font-size:1.2rem;
  font-weight:1000;

  box-shadow:
    0 18px 40px rgba(255,122,0,.25);
}

/* =========================================================
BACK
========================================================= */

.back-top{

  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
}

.back-title{

  font-size:2.1rem;
  font-weight:1000;
}

.back-sub{

  margin-top:10px;

  color:#a9bad6;

  font-size:1rem;
  font-weight:600;
}

.back-links{

  margin-top:34px;

  display:grid;

  grid-template-columns:
    repeat(3,1fr);

  gap:20px;
}

.back-link{

  min-height:90px;

  padding:24px;

  border-radius:24px;

  background:
    rgba(255,255,255,.04);

  border:
    1px solid rgba(255,255,255,.06);

  transition:.25s ease;

  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:10px;
}

.back-link:hover{

  transform:
    translateY(-5px);

  background:
    rgba(255,122,0,.08);

  border-color:
    rgba(255,122,0,.24);
}

.back-link strong{

  font-size:1.15rem;
  font-weight:900;
}

.back-link span{

  color:#94a3b8;

  font-size:.95rem;
  font-weight:700;
}

.back-footer{

  margin-top:auto;

  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
  flex-wrap:wrap;
}

.back-user{

  color:#dbe5f4;

  font-size:1rem;
  font-weight:700;

  line-height:2;
}

.back-actions{

  display:flex;
  align-items:center;
  gap:16px;
}

.back-actions button{

  min-width:180px;

  height:66px;

  padding-inline:20px;

  border-radius:18px;

  font-size:1rem;
  font-weight:1000;
}

.back-actions .verified{

  background:
    linear-gradient(
      135deg,
      #22c55e,
      #16a34a
    );

  color:white;
}

.back-actions .back-btn{

  background:
    linear-gradient(
      135deg,
      #ff7a00,
      #ff9830
    );

  color:white;
}

/* =========================================================
LOADER
========================================================= */

.loading{

  padding:120px 20px;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:22px;
}

.loader{

  width:68px;
  height:68px;

  border-radius:999px;

  border:
    5px solid rgba(255,255,255,.08);

  border-top-color:#ff8a26;

  animation:spin .7s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

/* =========================================================
RESPONSIVE
========================================================= */

@media (max-width:1600px){

  .member-front{

    grid-template-columns:
      1fr;

    gap:26px;
  }

  .separator{
    display:none;
  }

  .badges{
    flex-direction:row;
    flex-wrap:wrap;
  }

  .actions{
    flex-direction:row;
  }

  .actions button{
    flex:1;
  }
}

@media (max-width:900px){

  .container{
    padding-inline:16px;
  }

  .topbar-inner{
    align-items:flex-start;
  }

  .right-top{
    width:100%;
  }

  .stats{
    width:100%;
  }

  .search{
    width:100%;
  }

  .profile{
    flex-direction:column;
    align-items:flex-start;
  }

  .member-face{
    padding:24px;
  }

  .member-name{
    font-size:2rem;
  }

  .role{
    font-size:1.2rem;
  }

  .bio{
    font-size:1.05rem;
  }

  .back-links{
    grid-template-columns:1fr;
  }

  .back-footer{
    flex-direction:column;
    align-items:flex-start;
  }

  .back-actions{
    width:100%;
    flex-direction:column;
  }

  .back-actions button{
    width:100%;
  }

  .actions{
    flex-direction:column;
  }

  .verify-btn,
  .flip-btn{
    width:100%;
  }
}

</style>
</head>

<body>

<div class="container">

  <!-- =====================================================
  TOPBAR
  ====================================================== -->

  <section class="topbar">

    <div class="topbar-inner">

      <div class="brand">

        <div class="logo">
          AF
        </div>

        <div>

          <div class="brand-title">
            AcademeForge
          </div>

          <div class="brand-sub">
            Workforce Registry
          </div>

        </div>

      </div>

      <div class="right-top">

        <div class="stats">

          <div class="stat-card">

            <div class="stat-icon blue">
              👥
            </div>

            <div class="stat-info">

              <small>
                Total Members
              </small>

              <strong id="totalMembers">
                0
              </strong>

            </div>

          </div>

          <div class="stat-card">

            <div class="stat-icon green">
              👤
            </div>

            <div class="stat-info">

              <small>
                Active Members
              </small>

              <strong id="activeMembers">
                0
              </strong>

            </div>

          </div>

          <div class="stat-card">

            <div class="stat-icon purple">
              🎓
            </div>

            <div class="stat-info">

              <small>
                Alumni Members
              </small>

              <strong id="alumniMembers">
                0
              </strong>

            </div>

          </div>

        </div>

        <div class="search">

          <div style="font-size:22px;">
            🔍
          </div>

          <input
            id="searchInput"
            type="text"
            placeholder="Search members..."
          />

        </div>

      </div>

    </div>

  </section>

  <!-- =====================================================
  MEMBERS
  ====================================================== -->

  <section class="members">

    <div
      id="loading"
      class="loading"
    >

      <div class="loader"></div>

      <div
        style="
          font-size:1.1rem;
          font-weight:800;
        "
      >
        Loading Workforce Registry...
      </div>

    </div>

    <div
      id="membersGrid"
      class="members-grid"
    ></div>

  </section>

</div>

<script>

/* =========================================================
CONFIG
========================================================= */

const AF_API =
  "https://afooyyydhlwngzssgqih.supabase.co/functions/v1/get-af-team-members";

const AF_ANON_KEY =
  "YOUR_SUPABASE_ANON_KEY";

const CACHE_KEY =
  "af_registry_cache_v5";

const CACHE_TIME =
  "af_registry_cache_time_v5";

const CACHE_DURATION =
  1000 * 60 * 10;

/* =========================================================
ELEMENTS
========================================================= */

const membersGrid =
  document.getElementById("membersGrid");

const loading =
  document.getElementById("loading");

const searchInput =
  document.getElementById("searchInput");

let allMembers = [];

/* =========================================================
UTILS
========================================================= */

function escapeHtml(value){

  return String(value || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function safeUrl(url){

  if(!url){
    return "";
  }

  const value =
    String(url).trim();

  if(
    value.startsWith("https://") ||
    value.startsWith("http://")
  ){
    return value;
  }

  return "";
}

function formatDate(date){

  if(!date){
    return "Present";
  }

  try{

    return new Date(date)
      .toLocaleDateString(
        "en-IN",
        {
          year:"numeric",
          month:"short"
        }
      );

  }catch{
    return "Present";
  }
}

function avatar(member){

  if(
    member.avatar_url &&
    member.avatar_url.startsWith("http")
  ){

    return `
      <img
        src="${escapeHtml(member.avatar_url)}"
        alt="${escapeHtml(member.full_name)}"
      />
    `;
  }

  return escapeHtml(
    member.full_name
      .split(" ")
      .map(v => v[0] || "")
      .join("")
      .slice(0,2)
      .toUpperCase()
  );
}

function normalize(member){

  return {

    full_name:
      member.full_name ||
      "Unknown Member",

    role_title:
      member.role_title ||
      "AcademeForge Member",

    member_id:
      member.member_id ||
      "AF-UNKNOWN",

    department:
      member.department ||
      "GENERAL",

    bio:
      member.bio ||
      "Verified ecosystem member.",

    status:
      String(member.status || "active")
        .toLowerCase(),

    avatar_url:
      member.avatar_url || "",

    username:
      member.username || "member",

    location:
      member.location || "India",

    joined_at:
      member.joined_at || null,

    ended_at:
      member.ended_at || null,

    linkedin_url:
      safeUrl(member.linkedin_url),

    github_url:
      safeUrl(member.github_url),

    portfolio_url:
      safeUrl(member.portfolio_url)
  };
}

/* =========================================================
CARD
========================================================= */

function card(member){

  const verifyClass =
    member.status === "inactive"
      ? "red"
      : "";

  const verifyIcon =
    member.status === "inactive"
      ? "✕"
      : "✓";

  const statusClass =
    member.status === "active"
      ? "active"
      : member.status === "alumni"
        ? "alumni"
        : member.status === "on_leave"
          ? "on_leave"
          : "inactive";

  const statusText =
    member.ended_at
      ? `
      <div class="meta-item">

        <div class="dot red"></div>

        <span>
          Ended:
          ${formatDate(member.ended_at)}
        </span>

      </div>
      `
      : `
      <div class="meta-item">

        <div class="dot green"></div>

        <span>
          Currently Active
        </span>

      </div>
      `;

  return `

    <div class="member-card">

      <div class="member-inner">

        <!-- FRONT -->

        <div class="member-face member-front">

          <div class="profile">

            <div class="avatar">
              ${avatar(member)}
            </div>

            <div class="profile-info">

              <div class="name-row">

                <div class="member-name">
                  ${escapeHtml(member.full_name)}
                </div>

                <div class="verify ${verifyClass}">
                  ${verifyIcon}
                </div>

              </div>

              <div class="role">
                ${escapeHtml(member.role_title)}
              </div>

              <div class="member-id">
                ${escapeHtml(member.member_id)}
              </div>

            </div>

          </div>

          <div class="separator"></div>

          <div class="badges">

            <div class="badge department">
              ${escapeHtml(member.department)}
            </div>

            <div class="badge ${statusClass}">
              ${escapeHtml(member.status)}
            </div>

          </div>

          <div class="separator"></div>

          <div class="bio">
            ${escapeHtml(member.bio)}
          </div>

          <div class="meta">

            <div class="meta-item">

              <div style="font-size:20px;">
                📅
              </div>

              <span>
                Joined:
                ${formatDate(member.joined_at)}
              </span>

            </div>

            ${statusText}

          </div>

          <div class="actions">

            <button class="verify-btn">

          </div>

        </div>

        <!-- BACK -->

        <div class="member-face member-back">

          <div class="back-top">

            <div>

              <div class="back-title">
                ${escapeHtml(member.full_name)}
              </div>

              <div class="back-sub">
                Official Workforce Profile
              </div>

            </div>

          </div>

          <div class="back-links">

            ${
              member.linkedin_url
              ? `
              <a
                href="${escapeHtml(member.linkedin_url)}"
                target="_blank"
                class="back-link"
              >

                <strong>
                  LinkedIn
                </strong>

                <span>
                  Open Professional Profile →
                </span>

              </a>
              `
              : ""
            }

            ${
              member.github_url
              ? `
              <a
                href="${escapeHtml(member.github_url)}"
                target="_blank"
                class="back-link"
              >

                <strong>
                  GitHub
                </strong>

                <span>
                  Open Repository Profile →
                </span>

              </a>
              `
              : ""
            }

            ${
              member.portfolio_url
              ? `
              <a
                href="${escapeHtml(member.portfolio_url)}"
                target="_blank"
                class="back-link"
              >

                <strong>
                  Portfolio
                </strong>

                <span>
                  Open Website →
                </span>

              </a>
              `
              : ""
            }

          </div>

          <div class="back-footer">

            <div class="back-user">

              📍 ${escapeHtml(member.location)}

              <br>

              Username:
              @${escapeHtml(member.username)}

            </div>

            <div class="back-actions">

              <button class="verified">
                Verified Member
              </button>

              <button class="back-btn">
                Flip Back ↻
              </button>

            </div>

          </div>

        </div>

      </div>

    </div>
  `;
}

/* =========================================================
RENDER
========================================================= */

function render(data){

  membersGrid.innerHTML =
    data.map(card).join("");

  attachEvents();
}

/* =========================================================
FLIP
========================================================= */

function attachEvents(){

  const cards =
    document.querySelectorAll(".member-card");

  cards.forEach(card => {

    const inner =
      card.querySelector(".member-inner");

    const links =
      card.querySelectorAll("a");

    links.forEach(link => {

      link.addEventListener(
        "click",
        event => {
          event.stopPropagation();
        }
      );
    });

    inner.addEventListener(
      "click",
      () => {

        card.classList.toggle(
          "flipped"
        );
      }
    );
  });
}

/* =========================================================
STATS
========================================================= */

function updateStats(){

  document.getElementById(
    "totalMembers"
  ).textContent =
    allMembers.length;

  document.getElementById(
    "activeMembers"
  ).textContent =
    allMembers.filter(
      m => m.status === "active"
    ).length;

  document.getElementById(
    "alumniMembers"
  ).textContent =
    allMembers.filter(
      m => m.status === "alumni"
    ).length;
}

/* =========================================================
CACHE
========================================================= */

function saveCache(data){

  try{

    localStorage.setItem(
      CACHE_KEY,
      JSON.stringify(data)
    );

    localStorage.setItem(
      CACHE_TIME,
      String(Date.now())
    );

  }catch(error){

    console.error(
      "Cache save failed",
      error
    );
  }
}

function loadCache(){

  try{

    const cache =
      localStorage.getItem(
        CACHE_KEY
      );

    const time =
      Number(
        localStorage.getItem(
          CACHE_TIME
        )
      );

    if(
      !cache ||
      !time
    ){
      return null;
    }

    if(
      Date.now() - time >
      CACHE_DURATION
    ){
      return null;
    }

    return JSON.parse(cache);

  }catch(error){

    console.error(
      "Cache load failed",
      error
    );

    return null;
  }
}

/* =========================================================
SEARCH
========================================================= */

searchInput.addEventListener(
  "input",
  () => {

    const query =
      searchInput.value
        .trim()
        .toLowerCase();

    if(!query){

      render(allMembers);
      return;
    }

    const filtered =
      allMembers.filter(member => {

        return [

          member.full_name,
          member.role_title,
          member.department,
          member.member_id,
          member.bio,
          member.status

        ]
        .join(" ")
        .toLowerCase()
        .includes(query);
      });

    render(filtered);
  }
);

/* =========================================================
FETCH
========================================================= */

async function fetchMembers(){

  const response =
    await fetch(
      AF_API,
      {
        method:"GET",

        headers:{

          apikey:
            AF_ANON_KEY,

          Authorization:
            `Bearer ${AF_ANON_KEY}`,

          "Content-Type":
            "application/json"
        }
      }
    );

  if(!response.ok){

    throw new Error(
      `HTTP ${response.status}`
    );
  }

  return await response.json();
}

/* =========================================================
LOAD
========================================================= */

async function loadMembers(){

  try{

    loading.style.display =
      "flex";

    const cached =
      loadCache();

    if(
      cached &&
      Array.isArray(cached.members)
    ){

      allMembers =
        cached.members
          .map(normalize);

      updateStats();

      render(allMembers);

      loading.style.display =
        "none";
    }

    const data =
      await fetchMembers();

    allMembers =
      (data.members || [])
        .map(normalize);

    updateStats();

    render(allMembers);

    saveCache({
      members:allMembers
    });

  }catch(error){

    console.error(error);

    if(!allMembers.length){

      membersGrid.innerHTML = `

        <div
          style="
            width:100%;
            padding:50px;
            border-radius:30px;
            background:#091326;
            border:1px solid rgba(255,255,255,.08);
            text-align:center;
          "
        >

          <div
            style="
              font-size:2rem;
              font-weight:1000;
            "
          >
            Failed To Load Registry
          </div>

          <div
            style="
              margin-top:18px;
              color:#94a3b8;
              font-size:1.05rem;
              line-height:1.8;
            "
          >
            ${escapeHtml(error.message)}
          </div>

        </div>
      `;
    }

  }finally{

    loading.style.display =
      "none";
  }
}

window.addEventListener(
  "DOMContentLoaded",
  loadMembers
);

</script>
