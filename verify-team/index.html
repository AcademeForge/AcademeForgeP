<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>AcademeForge Workforce Registry</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
  rel="stylesheet"
/>

<style>

:root{

  --bg:#020617;
  --card:#071127;
  --card2:#0a1630;

  --text:#ffffff;
  --muted:#94a3b8;

  --line:rgba(255,255,255,.08);

  --orange:#ff8b2b;
  --orange2:#ff6b00;

  --green:#22c55e;
  --green2:#16a34a;

  --purple:#8b5cf6;
  --blue:#3b82f6;

  --danger:#ef4444;

  --shadow:
    0 20px 70px rgba(0,0,0,.45);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  overflow-x:hidden;
}

body{

  font-family:
    Inter,
    system-ui,
    sans-serif;

  color:var(--text);

  background:
    radial-gradient(circle at top left, rgba(59,130,246,.12), transparent 25%),
    radial-gradient(circle at top right, rgba(139,92,246,.12), transparent 25%),
    linear-gradient(180deg,#020617 0%,#030b1c 100%);

  min-height:100vh;
}

body::before{

  content:"";

  position:fixed;
  inset:0;

  pointer-events:none;

  background-image:
    linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);

  background-size:48px 48px;
}

a{
  text-decoration:none;
  color:inherit;
}

button{
  border:none;
  outline:none;
  cursor:pointer;
  font:inherit;
}

img{
  display:block;
}

.container{
  width:100%;
  padding-inline:38px;
}

/* =========================================================
TOP
========================================================= */

.topbar{

  padding-top:20px;
  padding-bottom:20px;
}

.topbar-inner{

  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:24px;
  flex-wrap:wrap;
}

.brand{

  display:flex;
  align-items:center;
  gap:16px;
}

.logo{

  width:54px;
  height:54px;

  border-radius:18px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
    linear-gradient(
      135deg,
      #ff7b00,
      #ffb020
    );

  color:white;

  font-size:28px;
  font-weight:1000;

  box-shadow:
    0 16px 40px rgba(255,123,0,.35);
}

.brand-title{

  font-size:2rem;
  font-weight:900;
  line-height:1;
}

.brand-sub{

  margin-top:6px;

  color:#b7c1d6;

  font-size:1rem;
  font-weight:600;
}

.top-actions{

  display:flex;
  align-items:center;
  gap:18px;
  flex-wrap:wrap;
}

.stat-box{

  min-width:190px;

  height:72px;

  padding:0 20px;

  border-radius:20px;

  display:flex;
  align-items:center;
  gap:16px;

  background:
    linear-gradient(
      180deg,
      rgba(9,18,39,.96),
      rgba(4,10,24,.98)
    );

  border:
    1px solid rgba(255,255,255,.06);

  box-shadow:var(--shadow);
}

.stat-icon{

  width:46px;
  height:46px;

  border-radius:14px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:22px;
}

.stat-icon.blue{
  background:rgba(59,130,246,.12);
  color:#60a5fa;
}

.stat-icon.green{
  background:rgba(34,197,94,.12);
  color:#4ade80;
}

.stat-icon.purple{
  background:rgba(168,85,247,.12);
  color:#c084fc;
}

.stat-data small{

  display:block;

  color:#cbd5e1;

  font-size:.88rem;
  font-weight:600;
}

.stat-data strong{

  display:block;

  margin-top:4px;

  font-size:2rem;
  font-weight:1000;
}

.search-box{

  width:300px;
  height:68px;

  padding:0 22px;

  border-radius:22px;

  display:flex;
  align-items:center;
  gap:14px;

  background:
    linear-gradient(
      180deg,
      rgba(9,18,39,.96),
      rgba(4,10,24,.98)
    );

  border:
    1px solid rgba(255,255,255,.08);

  box-shadow:var(--shadow);
}

.search-box input{

  width:100%;

  background:none;
  border:none;
  outline:none;

  color:white;

  font-size:1rem;
  font-weight:700;
}

.search-box input::placeholder{
  color:#94a3b8;
}

/* =========================================================
CARDS
========================================================= */

.registry{

  padding-bottom:80px;
}

.members-grid{

  display:flex;
  flex-direction:column;
  gap:28px;
}

.member-card{

  position:relative;

  width:100%;
  min-height:260px;

  perspective:2400px;
}

.member-inner{

  position:relative;

  width:100%;
  min-height:260px;

  transform-style:preserve-3d;

  transition:
    transform .9s cubic-bezier(.22,.61,.36,1);
}

.member-card.flipped .member-inner{
  transform:rotateY(180deg);
}

.member-face{

  position:absolute;
  inset:0;

  width:100%;
  min-height:260px;

  padding:34px;

  border-radius:28px;

  backface-visibility:hidden;

  overflow:hidden;

  background:
    linear-gradient(
      180deg,
      rgba(7,13,32,.98),
      rgba(2,6,22,.99)
    );

  border:
    1px solid rgba(255,255,255,.08);

  box-shadow:var(--shadow);
}

.member-face::before{

  content:"";

  position:absolute;

  top:-100px;
  right:-100px;

  width:240px;
  height:240px;

  border-radius:999px;

  background:
    radial-gradient(
      circle,
      rgba(59,130,246,.16),
      transparent 70%
    );

  pointer-events:none;
}

.member-front{

  display:grid;

  grid-template-columns:
    380px
    190px
    1fr
    250px
    200px;

  gap:26px;
  align-items:center;
}

.member-back{

  transform:rotateY(180deg);

  display:flex;
  flex-direction:column;
}

/* =========================================================
LEFT
========================================================= */

.profile-side{

  display:flex;
  align-items:center;
  gap:24px;

  min-width:0;
}

.avatar{

  width:110px;
  height:110px;

  border-radius:28px;

  flex-shrink:0;

  overflow:hidden;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
    linear-gradient(
      135deg,
      #ff0077,
      #7c3aed
    );

  color:white;

  font-size:3.2rem;
  font-weight:1000;

  box-shadow:
    0 18px 50px rgba(236,72,153,.35);
}

.avatar img{

  width:100%;
  height:100%;

  object-fit:cover;
}

.profile-info{
  min-width:0;
}

.name-row{

  display:flex;
  align-items:center;
  gap:14px;

  flex-wrap:wrap;
}

.member-name{

  font-size:2.4rem;
  font-weight:1000;

  letter-spacing:-.05em;
}

.verify-icon{

  width:34px;
  height:34px;

  border-radius:999px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
    linear-gradient(
      135deg,
      #22c55e,
      #16a34a
    );

  color:white;

  font-size:16px;
  font-weight:1000;
}

.verify-icon.inactive{

  background:
    linear-gradient(
      135deg,
      #ef4444,
      #dc2626
    );
}

.role{

  margin-top:10px;

  color:#d7deed;

  font-size:1.4rem;
  font-weight:700;
}

.member-id{

  margin-top:12px;

  color:#ff982f;

  font-size:1rem;
  font-weight:1000;

  letter-spacing:.18em;
}

/* =========================================================
SEPARATOR
========================================================= */

.separator{

  width:1px;
  height:130px;

  background:
    linear-gradient(
      180deg,
      transparent,
      rgba(255,255,255,.12),
      transparent
    );
}

/* =========================================================
BADGES
========================================================= */

.badges{

  display:flex;
  flex-direction:column;
  gap:14px;
}

.badge{

  min-height:54px;

  padding:
    0 22px;

  border-radius:999px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:1rem;
  font-weight:1000;

  letter-spacing:.08em;
  text-transform:uppercase;
}

.badge.department{

  background:
    rgba(99,102,241,.12);

  color:#8ea1ff;

  border:
    1px solid rgba(99,102,241,.16);
}

.badge.active{

  background:
    rgba(34,197,94,.12);

  color:#4ade80;

  border:
    1px solid rgba(34,197,94,.16);
}

.badge.alumni{

  background:
    rgba(168,85,247,.12);

  color:#d8b4fe;

  border:
    1px solid rgba(168,85,247,.16);
}

.badge.on_leave{

  background:
    rgba(234,179,8,.12);

  color:#fde047;

  border:
    1px solid rgba(234,179,8,.16);
}

.badge.inactive{

  background:
    rgba(239,68,68,.12);

  color:#f87171;

  border:
    1px solid rgba(239,68,68,.16);
}

/* =========================================================
BIO
========================================================= */

.bio{

  color:#d4dbea;

  font-size:1.18rem;

  line-height:2.1;
}

/* =========================================================
META
========================================================= */

.meta-box{

  padding:24px;

  border-radius:24px;

  background:
    rgba(255,255,255,.03);

  border:
    1px solid rgba(255,255,255,.06);

  display:flex;
  flex-direction:column;
  gap:22px;
}

.meta-item{

  display:flex;
  align-items:center;
  gap:14px;
}

.dot{

  width:14px;
  height:14px;

  border-radius:999px;
}

.dot.green{
  background:#22c55e;
}

.dot.red{
  background:#ef4444;
}

.meta-item span{

  color:#dbe5f4;

  font-size:1.15rem;
  font-weight:700;
}

/* =========================================================
ACTIONS
========================================================= */

.actions{

  display:flex;
  flex-direction:column;
  gap:18px;
}

.verify-btn{

  height:74px;

  border-radius:22px;

  background:
    linear-gradient(
      135deg,
      #22c55e,
      #16a34a
    );

  color:white;

  font-size:1.3rem;
  font-weight:1000;

  box-shadow:
    0 18px 40px rgba(34,197,94,.25);
}

.flip-btn{

  height:74px;

  border-radius:22px;

  background:
    linear-gradient(
      135deg,
      #ff7b00,
      #ff9830
    );

  color:white;

  font-size:1.3rem;
  font-weight:1000;

  box-shadow:
    0 18px 40px rgba(255,123,0,.28);
}

/* =========================================================
BACK
========================================================= */

.back-top{

  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
}

.back-title{

  font-size:2rem;
  font-weight:1000;
}

.back-sub{

  margin-top:10px;

  color:#b6c1d4;

  font-size:1rem;
  font-weight:600;
}

.back-links{

  margin-top:34px;

  display:grid;

  grid-template-columns:
    repeat(3,1fr);

  gap:20px;
}

.back-link{

  min-height:88px;

  padding:22px;

  border-radius:22px;

  background:
    rgba(255,255,255,.04);

  border:
    1px solid rgba(255,255,255,.06);

  transition:.25s ease;

  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:10px;
}

.back-link:hover{

  transform:
    translateY(-5px);

  border-color:
    rgba(255,123,0,.22);

  background:
    rgba(255,123,0,.08);
}

.back-link strong{

  font-size:1.15rem;
  font-weight:900;
}

.back-link span{

  color:#94a3b8;

  font-size:.95rem;
  font-weight:700;
}

.back-footer{

  margin-top:auto;

  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
  flex-wrap:wrap;
}

.back-user{

  color:#d5deec;

  font-size:1rem;
  font-weight:700;

  line-height:2;
}

.back-actions{

  display:flex;
  align-items:center;
  gap:16px;
}

.back-actions button{

  min-width:170px;

  height:64px;

  padding-inline:20px;

  border-radius:18px;

  font-size:1rem;
  font-weight:1000;
}

.back-actions .back-btn{

  background:
    linear-gradient(
      135deg,
      #ff7b00,
      #ff9830
    );

  color:white;
}

.back-actions .verified{

  background:
    linear-gradient(
      135deg,
      #22c55e,
      #16a34a
    );

  color:white;
}

/* =========================================================
LOADING
========================================================= */

.loading{

  padding:120px 20px;

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

.loader{

  width:64px;
  height:64px;

  border-radius:999px;

  border:
    5px solid rgba(255,255,255,.08);

  border-top-color:#ff8b2b;

  animation:spin .7s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

/* =========================================================
MOBILE
========================================================= */

@media (max-width:1450px){

  .member-front{

    grid-template-columns:
      1fr;

    gap:24px;
  }

  .separator{
    display:none;
  }

  .badges{
    flex-direction:row;
    flex-wrap:wrap;
  }

  .actions{
    flex-direction:row;
  }

  .actions button{
    flex:1;
  }

  .meta-box{
    width:100%;
  }
}

@media (max-width:900px){

  .container{
    padding-inline:18px;
  }

  .top-actions{
    width:100%;
  }

  .search-box{
    width:100%;
  }

  .profile-side{
    flex-direction:column;
    align-items:flex-start;
  }

  .member-face{
    padding:24px;
  }

  .member-name{
    font-size:2rem;
  }

  .role{
    font-size:1.1rem;
  }

  .back-links{
    grid-template-columns:1fr;
  }

  .back-footer{
    flex-direction:column;
    align-items:flex-start;
  }

  .back-actions{
    width:100%;
    flex-direction:column;
  }

  .back-actions button{
    width:100%;
  }

  .actions{
    flex-direction:column;
  }

  .verify-btn,
  .flip-btn{
    width:100%;
  }
}

</style>
</head>

<body>

<div class="container">

  <!-- =====================================================
  TOPBAR
  ====================================================== -->

  <section class="topbar">

    <div class="topbar-inner">

      <div class="brand">

        <div class="logo">
          AF
        </div>

        <div>

          <div class="brand-title">
            AcademeForge
          </div>

          <div class="brand-sub">
            Workforce Registry
          </div>

        </div>

      </div>

      <div class="top-actions">

        <div class="stat-box">

          <div class="stat-icon blue">
            👥
          </div>

          <div class="stat-data">

            <small>Total Members</small>

            <strong id="totalMembers">
              0
            </strong>

          </div>

        </div>

        <div class="stat-box">

          <div class="stat-icon green">
            👤
          </div>

          <div class="stat-data">

            <small>Active Members</small>

            <strong id="activeMembers">
              0
            </strong>

          </div>

        </div>

        <div class="stat-box">

          <div class="stat-icon purple">
            👥
          </div>

          <div class="stat-data">

            <small>Alumni Members</small>

            <strong id="alumniMembers">
              0
            </strong>

          </div>

        </div>

        <div class="search-box">

          <span style="font-size:22px;">🔍</span>

          <input
            id="searchInput"
            type="text"
            placeholder="Search members..."
          />

        </div>

      </div>

    </div>

  </section>

  <!-- =====================================================
  REGISTRY
  ====================================================== -->

  <section class="registry">

    <div
      id="loading"
      class="loading"
    >

      <div class="loader"></div>

      <div style="font-size:1.1rem;font-weight:800;">
        Loading Workforce Registry...
      </div>

    </div>

    <div
      id="membersGrid"
      class="members-grid"
    ></div>

  </section>

</div>

<script>

/* =========================================================
CONFIG
========================================================= */

const AF_API =
  "https://afooyyydhlwngzssgqih.supabase.co/functions/v1/get-af-team-members";

const AF_ANON_KEY =
  "YOUR_SUPABASE_ANON_KEY";

const CACHE_KEY =
  "af_registry_cache_v3";

const CACHE_TIME =
  "af_registry_cache_time_v3";

const CACHE_DURATION =
  1000 * 60 * 10;

/* =========================================================
ELEMENTS
========================================================= */

const loading =
  document.getElementById("loading");

const membersGrid =
  document.getElementById("membersGrid");

const searchInput =
  document.getElementById("searchInput");

let allMembers = [];

/* =========================================================
UTILS
========================================================= */

function escapeHtml(value){

  return String(value || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function safeUrl(url){

  if(!url){
    return "";
  }

  const value =
    String(url).trim();

  if(
    value.startsWith("https://") ||
    value.startsWith("http://")
  ){
    return value;
  }

  return "";
}

function formatDate(date){

  if(!date){
    return "Present";
  }

  try{

    return new Date(date)
      .toLocaleDateString(
        "en-IN",
        {
          year:"numeric",
          month:"short"
        }
      );

  }catch{
    return "Present";
  }
}

function avatar(member){

  if(
    member.avatar_url &&
    member.avatar_url.startsWith("http")
  ){

    return `
      <img
        src="${escapeHtml(member.avatar_url)}"
        alt="${escapeHtml(member.full_name)}"
      />
    `;
  }

  return escapeHtml(
    member.full_name
      .split(" ")
      .map(v => v[0] || "")
      .join("")
      .slice(0,2)
      .toUpperCase()
  );
}

function normalize(member){

  return {

    full_name:
      member.full_name ||
      "Unknown Member",

    role_title:
      member.role_title ||
      "AcademeForge Member",

    member_id:
      member.member_id ||
      "AF-UNKNOWN",

    department:
      member.department ||
      "GENERAL",

    bio:
      member.bio ||
      "Verified ecosystem member.",

    status:
      String(member.status || "active")
        .toLowerCase(),

    avatar_url:
      member.avatar_url || "",

    username:
      member.username || "member",

    location:
      member.location || "India",

    joined_at:
      member.joined_at || null,

    ended_at:
      member.ended_at || null,

    linkedin_url:
      safeUrl(member.linkedin_url),

    github_url:
      safeUrl(member.github_url),

    portfolio_url:
      safeUrl(member.portfolio_url)
  };
}

/* =========================================================
CARD
========================================================= */

function card(member){

  const isInactive =
    member.status === "inactive";

  const verifyClass =
    isInactive
      ? "inactive"
      : "";

  const verifyIcon =
    isInactive
      ? "✕"
      : "✓";

  const activeClass =
    member.status === "active"
      ? "active"
      : member.status === "alumni"
        ? "alumni"
        : member.status === "on_leave"
          ? "on_leave"
          : "inactive";

  const currentStatus =
    member.ended_at
      ? `
        <div class="meta-item">
          <div class="dot red"></div>
          <span>
            Ended: ${formatDate(member.ended_at)}
          </span>
        </div>
      `
      : `
        <div class="meta-item">
          <div class="dot green"></div>
          <span>
            Currently Active
          </span>
        </div>
      `;

  return `

    <div class="member-card">

      <div class="member-inner">

        <!-- =================================================
        FRONT
        ================================================== -->

        <div class="member-face member-front">

          <div class="profile-side">

            <div class="avatar">
              ${avatar(member)}
            </div>

            <div class="profile-info">

              <div class="name-row">

                <div class="member-name">
                  ${escapeHtml(member.full_name)}
                </div>

                <div class="verify-icon ${verifyClass}">
                  ${verifyIcon}
                </div>

              </div>

              <div class="role">
                ${escapeHtml(member.role_title)}
              </div>

              <div class="member-id">
                ${escapeHtml(member.member_id)}
              </div>

            </div>

          </div>

          <div class="separator"></div>

          <div class="badges">

            <div class="badge department">
              ${escapeHtml(member.department)}
            </div>

            <div class="badge ${activeClass}">
              ${escapeHtml(member.status)}
            </div>

          </div>

          <div class="separator"></div>

          <div class="bio">
            ${escapeHtml(member.bio)}
          </div>

          <div class="meta-box">

            <div class="meta-item">

              <div style="font-size:22px;">
                📅
              </div>

              <span>
                Joined:
                ${formatDate(member.joined_at)}
              </span>

            </div>

            ${currentStatus}

          </div>

          <div class="actions">

            <button class="verify-btn">
              🛡 Verified Member
            </button>

            <button class="flip-btn">
              Flip Card ↻
            </button>

          </div>

        </div>

        <!-- =================================================
        BACK
        ================================================== -->

        <div class="member-face member-back">

          <div class="back-top">

            <div>

              <div class="back-title">
                ${escapeHtml(member.full_name)}
              </div>

              <div class="back-sub">
                Official AcademeForge Workforce Profile
              </div>

            </div>

          </div>

          <div class="back-links">

            ${
              member.linkedin_url
              ? `
              <a
                href="${escapeHtml(member.linkedin_url)}"
                target="_blank"
                class="back-link"
              >

                <strong>
                  LinkedIn
                </strong>

                <span>
                  Open Professional Profile →
                </span>

              </a>
              `
              : ""
            }

            ${
              member.github_url
              ? `
              <a
                href="${escapeHtml(member.github_url)}"
                target="_blank"
                class="back-link"
              >

                <strong>
                  GitHub
                </strong>

                <span>
                  Open Repository Profile →
                </span>

              </a>
              `
              : ""
            }

            ${
              member.portfolio_url
              ? `
              <a
                href="${escapeHtml(member.portfolio_url)}"
                target="_blank"
                class="back-link"
              >

                <strong>
                  Portfolio
                </strong>

                <span>
                  Open Website →
                </span>

              </a>
              `
              : ""
            }

          </div>

          <div class="back-footer">

            <div class="back-user">

              📍 ${escapeHtml(member.location)}

              <br>

              Username:
              @${escapeHtml(member.username)}

            </div>

            <div class="back-actions">

              <button class="verified">
                Verified Member
              </button>

              <button class="back-btn">
                Flip Back ↻
              </button>

            </div>

          </div>

        </div>

      </div>

    </div>
  `;
}

/* =========================================================
RENDER
========================================================= */

function render(data){

  membersGrid.innerHTML =
    data.map(card).join("");

  attachCardEvents();
}

/* =========================================================
FLIP EVENTS
========================================================= */

function attachCardEvents(){

  const cards =
    document.querySelectorAll(".member-card");

  cards.forEach(card => {

    const inner =
      card.querySelector(".member-inner");

    const links =
      card.querySelectorAll("a");

    links.forEach(link => {

      link.addEventListener(
        "click",
        event => {
          event.stopPropagation();
        }
      );
    });

    inner.addEventListener(
      "click",
      () => {

        card.classList.toggle(
          "flipped"
        );
      }
    );
  });
}

/* =========================================================
STATS
========================================================= */

function updateStats(){

  document.getElementById(
    "totalMembers"
  ).textContent =
    allMembers.length;

  document.getElementById(
    "activeMembers"
  ).textContent =
    allMembers.filter(
      m => m.status === "active"
    ).length;

  document.getElementById(
    "alumniMembers"
  ).textContent =
    allMembers.filter(
      m => m.status === "alumni"
    ).length;
}

/* =========================================================
CACHE
========================================================= */

function saveCache(data){

  try{

    localStorage.setItem(
      CACHE_KEY,
      JSON.stringify(data)
    );

    localStorage.setItem(
      CACHE_TIME,
      String(Date.now())
    );

  }catch(error){

    console.error(
      "Cache save failed",
      error
    );
  }
}

function loadCache(){

  try{

    const cache =
      localStorage.getItem(
        CACHE_KEY
      );

    const time =
      Number(
        localStorage.getItem(
          CACHE_TIME
        )
      );

    if(
      !cache ||
      !time
    ){
      return null;
    }

    const expired =
      Date.now() - time >
      CACHE_DURATION;

    if(expired){
      return null;
    }

    return JSON.parse(cache);

  }catch(error){

    console.error(
      "Cache load failed",
      error
    );

    return null;
  }
}

/* =========================================================
SEARCH
========================================================= */

searchInput.addEventListener(
  "input",
  () => {

    const query =
      searchInput.value
        .trim()
        .toLowerCase();

    if(!query){

      render(allMembers);
      return;
    }

    const filtered =
      allMembers.filter(member => {

        return [

          member.full_name,
          member.role_title,
          member.department,
          member.member_id,
          member.bio,
          member.status

        ]
        .join(" ")
        .toLowerCase()
        .includes(query);

      });

    render(filtered);
  }
);

/* =========================================================
FETCH
========================================================= */

async function fetchMembers(){

  const response =
    await fetch(
      AF_API,
      {
        method:"GET",

        headers:{

          apikey:
            AF_ANON_KEY,

          Authorization:
            `Bearer ${AF_ANON_KEY}`,

          "Content-Type":
            "application/json"
        }
      }
    );

  if(!response.ok){

    throw new Error(
      `HTTP ${response.status}`
    );
  }

  return await response.json();
}

/* =========================================================
LOAD
========================================================= */

async function loadMembers(){

  try{

    loading.style.display =
      "flex";

    /* =====================================================
    CACHE FIRST
    ====================================================== */

    const cached =
      loadCache();

    if(
      cached &&
      Array.isArray(cached.members)
    ){

      allMembers =
        cached.members
          .map(normalize);

      updateStats();

      render(allMembers);

      loading.style.display =
        "none";
    }

    /* =====================================================
    NETWORK FETCH
    ====================================================== */

    const data =
      await fetchMembers();

    allMembers =
      (data.members || [])
        .map(normalize);

    updateStats();

    render(allMembers);

    saveCache({
      members:allMembers
    });

  }catch(error){

    console.error(error);

    if(!allMembers.length){

      membersGrid.innerHTML = `

        <div
          style="
            width:100%;
            padding:50px;
            border-radius:30px;
            background:#091326;
            border:1px solid rgba(255,255,255,.08);
            text-align:center;
          "
        >

          <div
            style="
              font-size:2rem;
              font-weight:1000;
            "
          >
            Failed To Load Registry
          </div>

          <div
            style="
              margin-top:18px;
              color:#94a3b8;
              font-size:1.05rem;
              line-height:1.8;
            "
          >
            ${escapeHtml(error.message)}
          </div>

        </div>
      `;
    }

  }finally{

    loading.style.display =
      "none";
  }
}

window.addEventListener(
  "DOMContentLoaded",
  loadMembers
);

</script>
